<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Lovable Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <div class="glass-card">
      <div class="header">
        <i data-lucide="sparkles" class="icon-accent"></i>
        <h1>Lovable Downloader</h1>
      </div>
      
      <div class="content">
        <div id="project-info" class="info-box hidden">
          <i data-lucide="folder" class="icon-muted"></i>
          <span id="project-id-text" class="text-truncate">Loading...</span>
        </div>
        <p id="status-message" class="status-message">프로젝트 페이지를 찾고 있습니다.</p>
        
        <button id="download-btn" class="btn-primary" disabled>
          <i data-lucide="download"></i>
          <span>소스코드 다운로드</span>
        </button>
      </div>

      <div id="progress-section" class="progress-section hidden">
        <div class="spinner">
            <i data-lucide="loader-2" class="spin"></i>
        </div>
        <span id="progress-text">코드를 추출하는 중...</span>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="libs/lucide.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
